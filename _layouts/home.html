---
layout: default
---

<!-- Print-only CV header -->
<div class="print-only cv-print-header mb-4">
    <h1 class="h2 mb-1">{{ site.title }}</h1>
    <div id="cv-print-contact" class="text-muted small"></div>
    <hr>
</div>

<div class="text-end mb-2 no-print">
    <button class="btn btn-outline-secondary btn-sm" onclick="window.print()">
        <i class="fas fa-file-pdf me-1"></i> Download as PDF
    </button>
</div>

<div class="row g-3">
    <!-- About (left side) -->
    <div class="col-md-6">
        <section id="about" class="h-100">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <h2 class="h4 mb-3">Hey there 👋</h2>
                    <div id="about-content">Loading...</div>
                </div>
            </div>
        </section>
    </div>

    <!-- Right side -->
    <div class="col-md-6">
        <section id="info">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">

                    <!-- Technologies -->
                    <h2 class="h4 mb-3">Tech Stack</h2>
                    <div id="technologies-list" class="technologies mb-4">
                        Loading technologies...
                    </div>

                    <hr>

                    <!-- Socials -->
                    <h2 class="h4 mb-3 mt-4">Connect With Me</h2>
                    <div id="social-links" class="social-links">
                        Loading social links...
                    </div>

                </div>
            </div>
        </section>
    </div>
</div>
