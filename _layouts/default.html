<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% seo %}
    <link rel="icon" type="image/png" href="{{ '/priv/images/avatar.png' | relative_url }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/syntax.css' | relative_url }}" id="syntax-light">
    <link rel="stylesheet" href="{{ '/syntax-dark.css' | relative_url }}" id="syntax-dark" disabled>
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
    <button class="theme-toggle btn btn-sm d-none d-lg-inline-flex" id="theme-toggle" data-theme-toggle
        aria-label="Toggle dark mode">
        <i class="fas fa-moon theme-icon"></i>
    </button>
    <header class="border-bottom site-header sticky-top">
        <nav class="navbar navbar-expand-lg">
            <div class="dog">
                <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" aria-label="moving sausage dog">
                    <!-- tail -->
                    <g class="tail">
                        <path d="M92 40 Q108 30 104 16" fill="none" stroke="#5b3a29" stroke-width="4"
                            stroke-linecap="round" />
                    </g>

                    <!-- body -->
                    <rect x="34" y="30" width="60" height="22" rx="11" fill="#8b5a3c" />

                    <!-- head -->
                    <circle cx="26" cy="35" r="13" fill="#8b5a3c" />

                    <!-- ear -->
                    <ellipse cx="30" cy="40" rx="4" ry="9" fill="#6f4630" transform="rotate(15 30 40)" />

                    <!-- snout -->
                    <ellipse cx="14" cy="38" rx="7" ry="5" fill="#a56d4b" />

                    <!-- nose -->
                    <circle cx="9" cy="38" r="1.8" fill="#222" />

                    <!-- eye -->
                    <circle cx="24" cy="32" r="1.8" fill="#222" />

                    <!-- legs -->
                    <rect x="42" y="50" width="5" height="15" rx="2.5" fill="#5b3a29" />
                    <rect x="72" y="50" width="5" height="15" rx="2.5" fill="#5b3a29" />
                    <rect x="84" y="50" width="5" height="15" rx="2.5" fill="#5b3a29" />

                    <!-- waving leg -->
                    <g class="wave-leg">
                        <rect x="40" y="48" width="5" height="16" rx="2.5" fill="#5b3a29" />
                    </g>

                    <!-- speech bubble -->
                    <g class="speech-bubble">
                        <!-- bubble -->
                        <rect x="0" y="2" width="100" height="18" rx="4" fill="#ffffff" stroke="#222"
                            stroke-width="1.5" />
                        <!-- tail pointer -->
                        <path d="M 28 20 L 24 26 L 33 20 Z" fill="#ffffff" stroke="#222" stroke-width="1.5"
                            stroke-linejoin="miter" />
                        <!-- text -->
                        <text x="50" y="14" font-family="Arial, sans-serif" font-size="7.5" fill="#222"
                            text-anchor="middle" font-weight="bold">WOOF WOOF IM FRANS!</text>
                    </g>
                </svg>
            </div>
            <div class="container-lg">
                <a class="navbar-brand d-flex align-items-center gap-2" href="{{ '/' | relative_url }}">
                    <span class="avatar-wrapper">
                        <img src="{{ '/priv/images/avatar.png' | relative_url }}" alt="Avatar" class="avatar" />
                    </span>
                    <span class="fw-semibold">{{ site.title }}</span>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#site-nav"
                    aria-controls="site-nav" aria-expanded="false" aria-label="Toggle navigation">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="collapse navbar-collapse navbar-desktop-center" id="site-nav">
                    <ul class="navbar-nav mx-lg-auto align-items-lg-center gap-lg-2 pt-2 pt-lg-0">
                        <li class="nav-item">
                            <a class="nav-link{% if page.url == '/' %} active{% endif %}"
                                href="{{ '/' | relative_url }}">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link{% if page.url contains '/project' %} active{% endif %}"
                                href="{{ '/project' | relative_url }}">Projects</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link{% if page.url contains '/blog' %} active{% endif %}"
                                href="{{ '/blog' | relative_url }}">Blog</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link{% if page.url contains '/notes' %} active{% endif %}"
                                href="{{ '/notes' | relative_url }}">Notes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link{% if page.url contains '/resources' %} active{% endif %}"
                                href="{{ '/resources' | relative_url }}">Resources</a>
                        </li>
                        <li class="nav-item d-lg-none">
                            <button class="btn btn-outline-secondary btn-sm mt-2" type="button" data-theme-toggle
                                aria-label="Toggle dark mode">
                                <i class="fas fa-moon theme-icon me-1"></i>
                                Theme
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="container-lg py-4">
        {{ content }}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ '/js/main.js' | relative_url }}"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

        // Initialize mermaid with theme support
        mermaid.initialize({
            startOnLoad: false,
            theme: document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'dark' : 'default',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis'
            },
            themeVariables: {
                fontSize: '14px'
            }
        });

        // Convert kramdown's code blocks to mermaid-ready format
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('code.language-mermaid').forEach((block) => {
                const pre = block.parentElement;
                const container = document.createElement('div');
                container.className = 'mermaid';
                container.textContent = block.textContent;
                pre.parentElement.replaceChild(container, pre);
            });

            // Render all mermaid diagrams
            mermaid.run();
        });
    </script>
</body>

</html>
